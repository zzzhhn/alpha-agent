# Apply pending DB migrations against Neon. Idempotent (schema_migrations tracks
# applied versions), so it is safe to re-run any time a new V*__*.sql lands.
# Needs only the DATABASE_URL secret — no BYOK_MASTER_KEY. Use this to apply
# e.g. V027 (factor_lessons) + V028 (brain_alphas) without the admin endpoint.
name: apply-migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[storage]"
      - name: Apply pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/apply_migrations.py
