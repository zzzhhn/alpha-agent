name: insider-form4

# Ingest SEC EDGAR Form 4 net insider value for the universe into Neon.
# Runs OUTSIDE Vercel (no 300s limit, clean US egress to SEC + Neon). The
# signal crons read the insider_form4 table this writes. Scheduled before the
# slow_daily signal cron (13:30 UTC) so the table is fresh when it primes.
on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: insider-form4
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[storage]" httpx python-dotenv
      - name: Ingest Form 4
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ingest_insider_form4.py
