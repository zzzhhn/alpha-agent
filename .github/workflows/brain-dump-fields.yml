# Discovery: dump the BRAIN data-field vocabulary (datasets + fundamental/analyst
# fields with coverage + descriptions) so the generator's economic ratios can be
# widened using CONFIRMED field ids. API-only, finishes in seconds. Manual trigger.
name: brain-dump-fields

on:
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[storage]"
      - name: Dump BRAIN data fields
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAIN_USERNAME: ${{ secrets.BRAIN_USERNAME }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          BYOK_MASTER_KEY: ${{ secrets.BYOK_MASTER_KEY }}
          BRAIN_MINING_USER_ID: ${{ secrets.BRAIN_MINING_USER_ID }}
        run: python scripts/brain_dump_fields.py
