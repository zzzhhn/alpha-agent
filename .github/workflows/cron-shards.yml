name: cron-shards
# External multi-shot cron driver.
# Hobby Vercel function timeout = 300s. This workflow calls the FastAPI cron
# endpoints in offset-sliced shots to walk SP500 under that budget.
#
# Endpoint shape (deployed at alpha.bobbyzhong.com, routed to alpha-agent backend):
#   GET /api/cron/slow_daily?limit=N&offset=M  (5 slow signals → daily_signals_slow)
#   GET /api/cron/fast_intraday?limit=N&offset=M (10 signals → daily_signals_fast → picks)
#
# Tuning notes (observed):
# - First-shot cold start adds ~5-10s overhead.
# - Running BOTH endpoints in parallel triggered yfinance/Postgres contention →
#   first shot in each job exceeded 300s (saw curl exit 28 timeout).
# - Fix: sequentialize jobs via `needs:` + lower per-shot limits + sleep 30s
#   between shots so the Vercel function stays warm but uncontended.

on:
  schedule:
    # Daily SP500 slow refresh — 13:30 UTC = 09:30 ET pre-open (weekdays).
    - cron: '30 13 * * 1-5'
    # Intraday fast refresh — every 2h during US market (14/16/18/20 UTC).
    - cron: '0 14,16,18,20 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'fast_intraday'
        type: choice
        options:
          - slow_daily
          - fast_intraday
          - both

env:
  BACKEND_BASE: https://alpha.bobbyzhong.com

jobs:
  # fast_intraday runs first when both are dispatched, so picks-page data
  # (the user-visible product surface) gets refreshed before the bulk slow
  # refresh tail. Each is independent at the data layer.
  fast_intraday:
    if: |
      github.event.schedule == '0 14,16,18,20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.job == 'fast_intraday' || inputs.job == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Top-240 fast refresh (6 shots × limit=40)
        # 10 signals/ticker × ~3.8s observed → 40 tickers ≈ 152s + cold start.
        # 6 shots × (152s + 30s sleep) = 18min wall, covers offset 0..240.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 40 80 120 160 200; do
            echo "::group::fast shot offset=$offset limit=40"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/fast_intraday?limit=40&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::fast shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 30
          done
          echo "## fast_intraday summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  slow_daily:
    # `needs` + `always()` lets slow_daily run after fast_intraday when both are
    # dispatched (sequential), while still triggering on its own schedule when
    # fast_intraday is skipped.
    needs: [fast_intraday]
    if: |
      always() && (
        github.event.schedule == '30 13 * * 1-5' ||
        (github.event_name == 'workflow_dispatch' &&
         (inputs.job == 'slow_daily' || inputs.job == 'both'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SP500 slow refresh (7 shots × limit=80)
        # 5 signals/ticker × ~1.5s observed → 80 tickers ≈ 120s + cold start.
        # 7 shots × (120s + 30s sleep) = 17min wall, covers offset 0..560 = full SP500.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 80 160 240 320 400 480; do
            echo "::group::slow shot offset=$offset limit=80"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/slow_daily?limit=80&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::slow shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 30
          done
          echo "## slow_daily summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY
