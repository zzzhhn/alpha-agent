name: cron-shards
# External multi-shot cron driver.
# Hobby Vercel function timeout = 300s. This workflow calls the FastAPI cron
# endpoints in offset-sliced shots to walk SP500 under that budget.
#
# Endpoint shape (deployed at alpha.bobbyzhong.com, routed to alpha-agent backend):
#   GET /api/cron/slow_daily?limit=N&offset=M  (5 slow signals → daily_signals_slow)
#   GET /api/cron/fast_intraday?limit=N&offset=M (10 signals → daily_signals_fast → picks)
#
# Tuning notes (observed):
# - First-shot cold start adds ~5-10s overhead.
# - Running BOTH endpoints in parallel triggered yfinance/Postgres contention →
#   first shot in each job exceeded 300s (saw curl exit 28 timeout).
# - Fix: sequentialize jobs via `needs:` + lower per-shot limits + sleep 30s
#   between shots so the Vercel function stays warm but uncontended.

on:
  schedule:
    # Daily SP500 slow refresh — 13:30 UTC = 09:30 ET pre-open (weekdays).
    - cron: '30 13 * * 1-5'
    # Periodic full-10-signal bootstrap for top-240 — every 2h during market.
    # Tier jobs (tech/mid/slow) cover the full 557 universe at higher
    # cadence for their respective signal subsets; this run rebuilds
    # the cached signals from scratch so any race-lost tier update is
    # corrected within 2h.
    - cron: '0 14,16,18,20 * * 1-5'
    # Tier: technicals only, all 557 + watchlist, every 15min during market.
    - cron: '*/15 14-20 * * 1-5'
    # Tier: options + analyst + premarket, all 557, hourly at :05 (stagger).
    - cron: '5 14-20 * * 1-5'
    # Tier: news + insider, all 557, every 4h at :10 (stagger).
    - cron: '10 14,18 * * 1-5'
    # News: per-ticker hourly during market (Finnhub primary + FMP failover + RSS)
    - cron: '0 14-20 * * 1-5'
    # News: Truth Social every 5 min (aligned with CNN mirror refresh), 24/7
    - cron: '*/5 * * * *'
    # News: Fed + OFAC hourly, 24/7
    - cron: '0 * * * *'
    # NOTE: news_llm_enrich cron removed 2026-05-17. BYOK architecture
    # means cron has no user-context to source an LLM key. Enrichment
    # moved to read-time path triggered by user with their own key.
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'fast_tech'
        type: choice
        options:
          - slow_daily
          - fast_intraday
          - fast_tech
          - fast_mid
          - fast_slow
          - both
          - news_per_ticker
          - news_macro

env:
  BACKEND_BASE: https://alpha.bobbyzhong.com

jobs:
  # fast_intraday runs first when both are dispatched, so picks-page data
  # (the user-visible product surface) gets refreshed before the bulk slow
  # refresh tail. Each is independent at the data layer.
  fast_intraday:
    if: |
      github.event.schedule == '0 14,16,18,20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.job == 'fast_intraday' || inputs.job == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Top-240 fast refresh (6 shots × limit=40)
        # 10 signals/ticker × ~3.8s observed → 40 tickers ≈ 152s + cold start.
        # 6 shots × (152s + 30s sleep) = 18min wall, covers offset 0..240.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 40 80 120 160 200; do
            echo "::group::fast shot offset=$offset limit=40"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/fast_intraday?limit=40&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::fast shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 30
          done
          echo "## fast_intraday summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  # ─── Tier: technicals only, every 15min, all 557 + watchlist ───────────
  fast_tech:
    if: |
      github.event.schedule == '*/15 14-20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'fast_tech')
    runs-on: ubuntu-latest
    timeout-minutes: 14
    steps:
      - name: Tech-only refresh (8 shots × limit=75)
        # 1 module/ticker × ~0.6s observed → 75 tickers ≈ 45s + cold start.
        # 8 shots × (60s + 10s sleep) ≈ 9min wall, covers offset 0..600.
        # Shorter sleep than full-fetch because fewer requests = less risk
        # of triggering Yahoo IP rate-limit.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 75 150 225 300 375 450 525; do
            echo "::group::tech shot offset=$offset limit=75"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/fast_intraday?tier=tech&limit=75&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::tech shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 10
          done
          echo "## fast_tech summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  # ─── Tier: options + analyst + premarket, hourly at :05 ─────────────────
  fast_mid:
    if: |
      github.event.schedule == '5 14-20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'fast_mid')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Mid-tier refresh (15 shots × limit=40)
        # 3 modules/ticker × ~3s observed → 40 tickers ≈ 120s + cold start.
        # 15 shots × (135s + 15s sleep) ≈ 37min wall, covers offset 0..600.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 40 80 120 160 200 240 280 320 360 400 440 480 520 560; do
            echo "::group::mid shot offset=$offset limit=40"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/fast_intraday?tier=mid&limit=40&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::mid shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 15
          done
          echo "## fast_mid summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  # ─── Tier: news + insider, every 4h at :10 ──────────────────────────────
  fast_slow:
    if: |
      github.event.schedule == '10 14,18 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'fast_slow')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Slow-tier refresh (10 shots × limit=60)
        # 2 modules/ticker × ~2s observed → 60 tickers ≈ 120s + cold start.
        # 10 shots × (135s + 15s sleep) ≈ 25min wall, covers offset 0..600.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 60 120 180 240 300 360 420 480 540; do
            echo "::group::slow-tier shot offset=$offset limit=60"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/fast_intraday?tier=slow&limit=60&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::slow-tier shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 15
          done
          echo "## fast_slow summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  slow_daily:
    # `needs` + `always()` lets slow_daily run after fast_intraday when both are
    # dispatched (sequential), while still triggering on its own schedule when
    # fast_intraday is skipped.
    needs: [fast_intraday]
    if: |
      always() && (
        github.event.schedule == '30 13 * * 1-5' ||
        (github.event_name == 'workflow_dispatch' &&
         (inputs.job == 'slow_daily' || inputs.job == 'both'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SP500 slow refresh (7 shots × limit=80)
        # 5 signals/ticker × ~1.5s observed → 80 tickers ≈ 120s + cold start.
        # 7 shots × (120s + 30s sleep) = 17min wall, covers offset 0..560 = full SP500.
        run: |
          set -e
          TOTAL_WRITTEN=0
          TOTAL_ERRORS=0
          for offset in 0 80 160 240 320 400 480; do
            echo "::group::slow shot offset=$offset limit=80"
            T0=$(date +%s)
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/slow_daily?limit=80&offset=$offset")
            DUR=$(( $(date +%s) - T0 ))
            echo "HTTP=$HTTP duration=${DUR}s"
            cat /tmp/shot.json | head -c 800
            echo
            if [ "$HTTP" != "200" ]; then
              echo "::error::slow shot offset=$offset returned HTTP $HTTP after ${DUR}s"
              exit 1
            fi
            WRITTEN=$(python3 -c "import json; print(json.load(open('/tmp/shot.json')).get('rows_written',0))")
            ERRORS=$(python3 -c "import json; print(len(json.load(open('/tmp/shot.json')).get('errors',[])))")
            TOTAL_WRITTEN=$((TOTAL_WRITTEN + WRITTEN))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            echo "::endgroup::"
            sleep 30
          done
          echo "## slow_daily summary" >> $GITHUB_STEP_SUMMARY
          echo "- rows_written total: $TOTAL_WRITTEN" >> $GITHUB_STEP_SUMMARY
          echo "- errors total: $TOTAL_ERRORS" >> $GITHUB_STEP_SUMMARY

  news_per_ticker:
    if: |
      github.event.schedule == '0 14-20 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'news_per_ticker')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: news per-ticker, 8 shots x limit=75
        run: |
          set -e
          for offset in 0 75 150 225 300 375 450 525; do
            HTTP=$(curl -s --max-time 290 -o /tmp/shot.json -w "%{http_code}" \
              "$BACKEND_BASE/api/cron/news_per_ticker?limit=75&offset=$offset")
            echo "offset=$offset HTTP=$HTTP"
            cat /tmp/shot.json | head -c 400; echo
            [ "$HTTP" = "200" ] || exit 1
            sleep 10
          done

  news_macro:
    if: |
      github.event.schedule == '*/5 * * * *' ||
      github.event.schedule == '0 * * * *' ||
      (github.event_name == 'workflow_dispatch' && inputs.job == 'news_macro')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: news macro single shot
        run: |
          HTTP=$(curl -s --max-time 60 -o /tmp/shot.json -w "%{http_code}" \
            "$BACKEND_BASE/api/cron/news_macro")
          cat /tmp/shot.json | head -c 400; echo
          [ "$HTTP" = "200" ] || exit 1

# news_llm_enrich job removed 2026-05-17 (BYOK architecture - enrich
# moved to read-time path triggered by user with their own LLM key).
