# Backfill BRAIN's OFFICIAL self-correlation for mined alphas recorded before the
# empty-200 poll fix (they stored None → UI showed 待定). API-only, no simulation.
# Manual trigger.
name: brain-backfill-selfcorr

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "max unsubmitted alphas to backfill"
        default: "120"
      max_wait:
        description: "seconds to wait per alpha (BRAIN computes self-corr lazily; cold alphas need >30s)"
        default: "120"
      diag:
        description: "evidence mode: comma-separated alpha_ids to raw-poll (dumps status/headers/body); skips the batch"
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # up to max_wait(120s) x limit alphas, plus install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[storage]"
      - name: Apply pending migrations (idempotent — code here reads the same schema)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/apply_migrations.py
      - name: Backfill official self-corr
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAIN_USERNAME: ${{ secrets.BRAIN_USERNAME }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          BYOK_MASTER_KEY: ${{ secrets.BYOK_MASTER_KEY }}
          BRAIN_MINING_USER_ID: ${{ secrets.BRAIN_MINING_USER_ID }}
          BACKFILL_LIMIT: ${{ github.event.inputs.limit }}
          BACKFILL_MAX_WAIT: ${{ github.event.inputs.max_wait || '120' }}
          BACKFILL_DIAG: ${{ github.event.inputs.diag || '' }}
        run: python scripts/brain_backfill_selfcorr.py
