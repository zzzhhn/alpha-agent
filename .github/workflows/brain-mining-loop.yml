# Phase E4: the WorldQuant BRAIN mining loop. Runs on GitHub Actions (BRAIN
# simulations poll for minutes — far past any serverless budget) and talks to
# Neon directly. Each round: auth with the user's vaulted BRAIN credentials,
# generate FASTEXPR candidates, simulate on BRAIN, gate on the real metrics,
# self-correlation check, and persist passing/flagged alphas for review.
#
# Required repo secrets: DATABASE_URL (Neon) + your BRAIN login as
# BRAIN_USERNAME / BRAIN_PASSWORD. The runner authenticates to BRAIN with those
# directly, so BYOK_MASTER_KEY is NOT needed here (handy — the backend's master
# key is a write-only Vercel Sensitive var). Optional: BYOK_MASTER_KEY (falls
# back to decrypting the vault if the BRAIN_* secrets are absent);
# BRAIN_MINING_USER_ID (defaults to the sole account).
name: brain-mining-loop

on:
  workflow_dispatch:
    inputs:
      n_candidates:
        description: "candidates to generate this round"
        default: "8"
      family_focus:
        description: "restrict generation to one family (e.g. options); blank = normal"
        default: ""
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC

concurrency:
  group: brain-mining-loop
  cancel-in-progress: false

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[storage]"
      - name: Apply pending migrations (idempotent — ensures brain_alphas exists)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/apply_migrations.py
      - name: Run one mining round
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRAIN_USERNAME: ${{ secrets.BRAIN_USERNAME }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          BYOK_MASTER_KEY: ${{ secrets.BYOK_MASTER_KEY }}
          BRAIN_MINING_USER_ID: ${{ secrets.BRAIN_MINING_USER_ID }}
          BRAIN_N_CANDIDATES: ${{ github.event.inputs.n_candidates || '8' }}
          BRAIN_FAMILY_FOCUS: ${{ github.event.inputs.family_focus || '' }}
          # Optional: enables the LLM financial-logic pre-screen. Unset → skipped.
          MINING_LLM_KEY: ${{ secrets.MINING_LLM_KEY }}
          MINING_LLM_MODEL: ${{ secrets.MINING_LLM_MODEL }}
          MINING_LLM_BASE: ${{ secrets.MINING_LLM_BASE }}
        run: python scripts/brain_mining_loop.py
